# =================================================================
# Configuracion de Logging para privacyIDEA
# =================================================================
[loggers]
keys=root,privacyidea

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_privacyidea]
level=INFO
handlers=consoleHandler
qualname=privacyidea
propagate=0

# Formato Unificado para Recolección en Contenedores
[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=[%(asctime)s][%(process)d][%(thread)d][%(levelname)s][%(module)s:%(funcName)s:%(lineno)d] %(message)s
datefmt=%Y-%m-%d %H:%M:%S

