# ==========================================
# TERMINACIÓN SSL Y REVERSE PROXY
# ==========================================
Listen 443

# Configuración Criptográfica Fuerte (Ciphers & Protocolos)
SSLCipherSuite HIGH:MEDIUM:!MD5:!RC4:!3DES
SSLProxyCipherSuite HIGH:MEDIUM:!MD5:!RC4:!3DES
SSLHonorCipherOrder on 
SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
SSLProxyProtocol all -SSLv3 -TLSv1 -TLSv1.1
SSLPassPhraseDialog builtin

# Optimización de Caché SSL
SSLSessionCache "shmcb:/usr/local/apache2/logs/ssl_scache(512000)"
SSLSessionCacheTimeout 300

<VirtualHost _default_:443>
    ServerName privacyidea.local
    ServerAdmin admin@localhost

    # Configuración de Certificados TLS
    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/certs/pi.pem"
    SSLCertificateKeyFile "/usr/local/apache2/certs/pi.key"

    # Enrutamiento Reverse Proxy Hacia Backend (Gunicorn)
    ProxyPreserveHost On
    ProxyPass / http://privacyidea:8000/
    ProxyPassReverse / http://privacyidea:8000/

    # Inyección de Cabeceras de Seguridad Hardened
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
</VirtualHost>