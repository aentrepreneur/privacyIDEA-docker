# clients.conf — RADIUS NAS/clients
# Para producción, este archivo es reemplazado por el backup on-premise
# o editado directamente con los IPs de los NAS reales

# Cliente localhost para pruebas locales
client localhost_test {
    ipaddr      = 127.0.0.1/32
    secret      = CHANGE_ME
    shortname   = localhost_test
    nastype     = other
}

