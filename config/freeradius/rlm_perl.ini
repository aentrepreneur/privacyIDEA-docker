[Default]
; URL del servicio privacyIDEA — usa nombre del servicio Docker
URL = http://privacyidea:8000/validate/check

; Realm por defecto (vacío = sin realm forzado)
REALM =

; Resolver por defecto (vacío = usa el default de privacyIDEA)
RESCONF =

; Verificar certificado SSL
; false para HTTP interno, true si usas HTTPS entre contenedores
SSL_CHECK = false

; Debug verbose en logs de FreeRADIUS (activar solo en troubleshooting)
DEBUG = false

; Timeout HTTP hacia privacyIDEA en segundos
TIMEOUT = 30

; Mapeo del serial del token en atributos RADIUS de respuesta
; Requiere dictionary.netknights en FreeRADIUS para que el atributo sea válido
[Mapping]
serial = privacyIDEA-Serial